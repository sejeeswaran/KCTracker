{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-brand">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="KC Logo" class="brand-icon">
                <h2>Create Account</h2>
                <p>Set up your KC Tracker ledger</p>
            </div>

            <form method="POST" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username"
                        placeholder="Choose a username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Create a password" required minlength="4">
                        <button type="button" class="password-toggle"
                            onclick="togglePassword('password', this)">Show</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                            placeholder="Confirm your password" required minlength="4">
                        <button type="button" class="password-toggle"
                            onclick="togglePassword('confirm_password', this)">Show</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
