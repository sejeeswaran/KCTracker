{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-brand">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="KC Logo" class="brand-icon">
                <h2>Welcome Back</h2>
                <p>Sign in to your KC Tracker account</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username"
                        placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Enter your password" required>
                        <button type="button" class="password-toggle"
                            onclick="togglePassword('password', this)">Show</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
